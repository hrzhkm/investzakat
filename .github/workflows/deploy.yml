name: Build And Deploy (Self-Hosted)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  build_and_push:
    runs-on: self-hosted
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Build and push app image
        env:
          OWNER: ${{ github.repository_owner }}
          TAG: ${{ github.sha }}
          VITE_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.VITE_DYNAMIC_ENVIRONMENT_ID }}
        run: |
          if [ -z "${VITE_DYNAMIC_ENVIRONMENT_ID}" ]; then
            echo "VITE_DYNAMIC_ENVIRONMENT_ID is not set. Add it in GitHub Actions Secrets."
            exit 1
          fi

          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          APP_IMAGE="ghcr.io/${OWNER_LC}/investzakat"

          docker build \
            --build-arg VITE_DYNAMIC_ENVIRONMENT_ID="${VITE_DYNAMIC_ENVIRONMENT_ID}" \
            -t "${APP_IMAGE}:${TAG}" \
            -t "${APP_IMAGE}:latest" \
            .

          docker push "${APP_IMAGE}:${TAG}"
          docker push "${APP_IMAGE}:latest"

  deploy:
    runs-on: self-hosted
    needs: build_and_push
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          echo "$GITHUB_TOKEN" | docker login ghcr.io -u "$GITHUB_ACTOR" --password-stdin

      - name: Pull and deploy stack
        env:
          OWNER: ${{ github.repository_owner }}
          IMAGE_TAG: ${{ github.sha }}
          POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          VITE_DYNAMIC_ENVIRONMENT_ID: ${{ secrets.VITE_DYNAMIC_ENVIRONMENT_ID }}
          COINGECKO_API_KEY: ${{ secrets.COINGECKO_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          SOLANA_RPC_URL: ${{ secrets.SOLANA_RPC_URL }}
          ETHEREUM_MAINNET_RPC_URL: ${{ secrets.ETHEREUM_MAINNET_RPC_URL }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          ARBITRUM_RPC_URL: ${{ secrets.ARBITRUM_RPC_URL }}
          OPTIMISM_RPC_URL: ${{ secrets.OPTIMISM_RPC_URL }}
        run: |
          OWNER_LC=$(echo "$OWNER" | tr '[:upper:]' '[:lower:]')
          export GHCR_NAMESPACE="ghcr.io/${OWNER_LC}"
          export IMAGE_TAG
          export POSTGRES_DB
          export POSTGRES_USER
          export POSTGRES_PASSWORD
          export BETTER_AUTH_URL
          export BETTER_AUTH_SECRET
          export VITE_DYNAMIC_ENVIRONMENT_ID
          export COINGECKO_API_KEY
          export FINNHUB_API_KEY
          export SOLANA_RPC_URL
          export ETHEREUM_MAINNET_RPC_URL
          export BASE_RPC_URL
          export ARBITRUM_RPC_URL
          export OPTIMISM_RPC_URL

          docker compose -f docker-compose.deploy.yml pull
          docker compose -f docker-compose.deploy.yml up -d --remove-orphans
